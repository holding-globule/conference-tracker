<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dental Conference Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; background: #f8f7f2; }
    body { padding: 1rem; }
    #root { min-height: 100vh; }
    input[type=text], input[type=url], input[type=number], input[type=date], select {
      padding: 0.5rem;
      border: 0.5px solid #d3d1c7;
      border-radius: 0.5rem;
      font-size: 14px;
      font-family: inherit;
    }
    input[type=text]:hover, input[type=url]:hover, input[type=number]:hover, input[type=date]:hover, select:hover {
      border-color: #b4b2a9;
    }
    input[type=text]:focus, input[type=url]:focus, input[type=number]:focus, input[type=date]:focus, select:focus {
      outline: none;
      border-color: #378add;
      box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1);
    }
    input[type=checkbox] {
      cursor: pointer;
      accent-color: #639922;
    }
    button {
      padding: 0.5rem 1rem;
      border: 0.5px solid #b4b2a9;
      background: transparent;
      border-radius: 0.5rem;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      color: #2c2c2a;
      transition: background 0.2s;
    }
    button:hover {
      background: #f1efe8;
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const SK = 'dental_conf_tracker';
    const MAX_DAYS = 10;
    const ALERT_DAYS = 30;
    const TODAY = new Date().toISOString().split('T')[0];
    const CURRENT_YEAR = new Date().getFullYear();
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const GITHUB_JSON_URL = 'https://holding-globule.github.io/dental-conference/dental-conferences.json';
    const GH_API_URL = 'https://api.github.com/repos/holding-globule/dental-conference/contents/dental-conferences.json';
    const GH_TOKEN_KEY = 'gh-token-dental-conference';

    function b64Encode(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (_, p1) => String.fromCharCode('0x' + p1)));
    }
    function ghToken() {
      let t = localStorage.getItem(GH_TOKEN_KEY);
      if (!t) {
        t = prompt('Paste your GitHub access token (stored only on this device):');
        if (t) { t = t.trim(); localStorage.setItem(GH_TOKEN_KEY, t); }
      }
      return t || null;
    }

    const daysBetween = (a, b) => !a || !b ? null : Math.round((new Date(b) - new Date(a)) / 86400000);
    
    const countWeekdays = (startStr, endStr) => {
      if (!startStr || !endStr) return 0;
      const start = new Date(startStr + 'T00:00:00');
      const end = new Date(endStr + 'T00:00:00');
      let count = 0;
      const current = new Date(start);
      while (current <= end) {
        const dow = current.getDay();
        if (dow >= 1 && dow <= 5) count++;
        current.setDate(current.getDate() + 1);
      }
      return count;
    };
    
    const confDur = c => {
      if (!c.s || !c.e) return 0;
      let days = countWeekdays(c.s, c.e);
      if (c.pre) {
        const preDay = new Date(c.pre + 'T00:00:00');
        if (preDay.getDay() >= 1 && preDay.getDay() <= 5) days += 1;
      }
      return days;
    };
    const fmt = s => {
      if (!s) return null;
      const [, m, d] = s.split('-');
      return `${+d} ${MONTHS[+m - 1]}`;
    };
    const getSt = c => {
      if (!c.s) return 'tbd';
      if (c.e < TODAY) return 'past';
      if (c.s <= TODAY) return 'live';
      return 'upcoming';
    };
    const dUntil = s => !s ? null : daysBetween(TODAY, s);
    const mkId = () => 'c' + Date.now();
    const blank = () => ({
      id: mkId(), name: '', city: '', s: null, e: null, pre: null, eb: null, url: null,
      reg: false, tr: false, ht: false, days: 0, yr: CURRENT_YEAR, confirmed: false
    });

    const INIT = [];

    function EditForm({ data, isNew, onChange, onSave, onCancel, onDelete }) {
      const [confirmDel, setConfirmDel] = useState(false);
      const nextDay = s => { const d = new Date(s + 'T00:00:00'); d.setDate(d.getDate() + 1); return d.toISOString().split('T')[0]; };
      const yrFrom = s => s ? new Date(s + 'T00:00:00').getFullYear() : CURRENT_YEAR;
      const set = (f, v) => onChange(p => {
        const u = { ...p, [f]: v === '' ? null : v };
        if (f === 's' && v) {
          if (!p.e || p.e === p.s) u.e = nextDay(v);
          u.yr = yrFrom(v);
        }
        return u;
      });
      const toggleBool = f => onChange(p => {
        if (f === 'reg') {
          const v = !p.reg;
          return { ...p, reg: v, days: v ? confDur(p) : 0 };
        }
        return { ...p, [f]: !p[f] };
      });
      const canSave = !!(data.name || '').trim();
      const calcDays = confDur(data);

      return (
        <div style={{ maxWidth: 600, margin: '0 auto', padding: '2rem 0' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: '1.5rem' }}>
            <button onClick={onCancel} style={{ background: 'transparent', border: 'none', padding: 4, cursor: 'pointer', fontSize: 18 }}>
              ← Back
            </button>
            <h2 style={{ margin: 0, fontSize: 18, fontWeight: 500 }}>{isNew ? 'Add conference' : 'Edit conference'}</h2>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem 1.5rem', marginBottom: '1.5rem' }}>
            <div style={{ gridColumn: '1/-1' }}>
              <label style={{ display: 'block', fontSize: 12, marginBottom: 4, fontWeight: 500 }}>Conference name *</label>
              <input value={data.name || ''} onChange={e => set('name', e.target.value)} placeholder="e.g. FDI World Dental Congress" style={{ width: '100%' }} />
            </div>

            <div style={{ gridColumn: '1/-1' }}>
              <label style={{ display: 'block', fontSize: 12, marginBottom: 4, fontWeight: 500 }}>City / country</label>
              <input value={data.city || ''} onChange={e => set('city', e.target.value)} placeholder="e.g. Prague, Czech Republic" style={{ width: '100%' }} />
            </div>

            <div>
              <label style={{ display: 'block', fontSize: 12, marginBottom: 4, fontWeight: 500 }}>Start date</label>
              <input type="date" value={data.s || ''} onChange={e => set('s', e.target.value)} style={{ width: '100%' }} />
            </div>

            <div>
              <label style={{ display: 'block', fontSize: 12, marginBottom: 4, fontWeight: 500 }}>Pre-conference date</label>
              <input type="date" value={data.pre || ''} onChange={e => set('pre', e.target.value)} style={{ width: '100%' }} />
            </div>

            <div>
              <label style={{ display: 'block', fontSize: 12, marginBottom: 4, fontWeight: 500 }}>End date</label>
              <input type="date" value={data.e || ''} min={data.s || ''} onChange={e => set('e', e.target.value)} style={{ width: '100%' }} />
            </div>

            <div>
              <label style={{ display: 'block', fontSize: 12, marginBottom: 4, fontWeight: 500 }}>Early-bird deadline</label>
              <input type="date" value={data.eb || ''} onChange={e => set('eb', e.target.value)} style={{ width: '100%' }} />
            </div>

            <div style={{ gridColumn: '1/-1' }}>
              <label style={{ display: 'block', fontSize: 12, marginBottom: 4, fontWeight: 500 }}>Conference program URL</label>
              <input type="url" value={data.url || ''} onChange={e => set('url', e.target.value)} placeholder="https://" style={{ width: '100%' }} />
              <p style={{ fontSize: 11, color: '#888780', margin: '6px 0 0 0' }}>Link to program PDF or webpage — opens via the program icon</p>
            </div>

            <div style={{ gridColumn: '1/-1', display: 'flex', gap: '1.5rem', flexWrap: 'wrap' }}>
              {[['reg', 'Registered'], ['tr', 'Transport booked'], ['ht', 'Hotel booked']].map(([f, l]) => (
                <label key={f} style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, cursor: 'pointer' }}>
                  <input type="checkbox" checked={!!data[f]} onChange={() => toggleBool(f)} />
                  {l}
                </label>
              ))}
            </div>

            {data.reg && (
              <div>
                <label style={{ display: 'block', fontSize: 12, marginBottom: 4, fontWeight: 500 }}>Days attending</label>
                <input
                  type="number" min="0" max="20" step="1"
                  value={data.days || 0}
                  onChange={e => onChange(p => ({ ...p, days: Math.max(0, +e.target.value || 0) }))}
                  style={{ width: '100%' }}
                />
                {calcDays > 0 && (
                  <p style={{ fontSize: 11, color: '#888780', margin: '6px 0 0 0' }}>
                    Conference spans {calcDays} day{calcDays !== 1 ? 's' : ''} · adjust if attending partially
                  </p>
                )}
              </div>
            )}
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
            <button onClick={onSave} disabled={!canSave} style={{ fontWeight: 500 }}>Save</button>
            <button onClick={onCancel}>Cancel</button>
            {onDelete && !confirmDel && (
              <button onClick={() => setConfirmDel(true)} style={{ marginLeft: 'auto', color: '#9E2928' }}>
                Delete
              </button>
            )}
            {onDelete && confirmDel && (
              <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 12, color: '#9E2928' }}>Delete this conference?</span>
                <button onClick={onDelete} style={{ color: '#9E2928' }}>Yes</button>
                <button onClick={() => setConfirmDel(false)}>No</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [confs, setConfs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('list');
      const [ed, setEd] = useState(null);
      const [isNew, setIsNew] = useState(false);
      const [fy, setFy] = useState(CURRENT_YEAR);
      const [saving, setSaving] = useState(false);

      const resetToken = () => {
        if (confirm('Reset the stored GitHub token on this device? You will be asked to paste it again next time you save.')) {
          localStorage.removeItem(GH_TOKEN_KEY);
          alert('✓ GitHub token cleared on this device');
        }
      };

      useEffect(() => {
        // Auto-load from GitHub on first open
        fetch(GITHUB_JSON_URL + '?nocache=' + Date.now())
          .then(r => r.json())
          .then(d => { if (Array.isArray(d)) setConfs(d); })
          .catch(() => {})
          .finally(() => setLoading(false));
      }, []);

      const loadFromGitHub = async () => {
        try {
          const r = await fetch(GITHUB_JSON_URL + '?nocache=' + Date.now());
          const d = await r.json();
          if (Array.isArray(d)) {
            setConfs(d);
            alert('✓ Loaded from GitHub');
          } else {
            alert('✗ Invalid JSON from GitHub');
          }
        } catch (err) {
          alert('✗ Error loading from GitHub: ' + err.message);
        }
      };

      const saveToGitHub = async () => {
        const token = ghToken(); if (!token) return;
        setSaving(true);
        try {
          const getRes = await fetch(GH_API_URL, {
            headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
          });
          if (getRes.status === 401) { localStorage.removeItem(GH_TOKEN_KEY); alert('GitHub rejected that token. Please try again.'); return; }
          let sha = null;
          if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
          const content = b64Encode(JSON.stringify(confs, null, 2));
          const body = { message: `Update dental-conferences.json — ${new Date().toLocaleString('en-GB')}`, content };
          if (sha) body.sha = sha;
          const putRes = await fetch(GH_API_URL, {
            method: 'PUT',
            headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (!putRes.ok) {
            const errText = await putRes.text().catch(() => '');
            throw new Error(`PUT failed: ${putRes.status} ${errText}`);
          }
          alert('✓ Saved to GitHub');
        } catch (err) {
          alert('Could not save to GitHub.\n\nDetails: ' + (err.message || err));
        } finally {
          setSaving(false);
        }
      };

      const persist = list => {
        setConfs(list);
      };

      const toggle = (id, f) => persist(confs.map(c => {
        if (c.id !== id) return c;
        const v = !c[f];
        if (f === 'reg') return { ...c, reg: v, days: v ? confDur(c) : 0 };
        return { ...c, [f]: v };
      }));

      const openEdit = c => { setEd({ ...c }); setIsNew(false); setView('edit'); };
      const openAdd = () => { setEd(blank()); setIsNew(true); setView('edit'); };
      const save = () => {
        const c = { ...ed };
        persist(isNew ? [...confs, c] : confs.map(x => x.id === c.id ? c : x));
        setView('list');
      };
      const del = () => { persist(confs.filter(x => x.id !== ed.id)); setView('list'); };

      const dByY = {};
      confs.forEach(c => { if (c.confirmed) dByY[c.yr] = (dByY[c.yr] || 0) + confDur(c); });
      const allYrs = [...new Set([...confs.map(c => c.yr), CURRENT_YEAR])].sort();
      const filtered = confs
        .filter(c => fy === 'all' || c.yr === fy)
        .sort((a, b) => {
          if (!a.s && !b.s) return 0;
          if (!a.s) return 1;
          if (!b.s) return -1;
          return a.s.localeCompare(b.s);
        });

      if (loading) return <div style={{ padding: '2rem', textAlign: 'center', color: '#888780' }}>Loading…</div>;
      
      if (confs.length === 0) {
        return (
          <div style={{ maxWidth: 600, margin: '0 auto', padding: '3rem 1rem', textAlign: 'center' }}>
            <h1 style={{ fontSize: 24, fontWeight: 600, margin: '0 0 1rem 0' }}>Dental conference tracker</h1>
            <p style={{ color: '#888780', marginBottom: '2rem' }}>Load your conference data from GitHub or import a JSON file</p>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap' }}>
              <button onClick={loadFromGitHub} style={{ fontSize: 14, fontWeight: 500, padding: '0.75rem 1.5rem' }}>⬇ Load from GitHub</button>
              <button onClick={() => document.getElementById('jsonImport').click()} style={{ fontSize: 14, fontWeight: 500, padding: '0.75rem 1.5rem' }}>⬆ Import JSON file</button>
            </div>
            <input 
              type="file" 
              id="jsonImport" 
              accept=".json" 
              style={{ display: 'none' }}
              onChange={(e) => {
                const file = e.target.files[0];
                if (file) {
                  const reader = new FileReader();
                  reader.onload = (evt) => {
                    try {
                      const imported = JSON.parse(evt.target.result);
                      if (Array.isArray(imported)) {
                        persist(imported);
                        e.target.value = '';
                      } else {
                        alert('✗ Invalid file format');
                      }
                    } catch (err) {
                      alert('✗ Error reading file: ' + err.message);
                    }
                  };
                  reader.readAsText(file);
                }
              }}
            />
          </div>
        );
      }
      
      if (view === 'edit') {
        return <EditForm data={ed} isNew={isNew} onChange={setEd} onSave={save} onCancel={() => setView('list')} onDelete={!isNew ? del : null} />;
      }

      const stC = { past: '#5f5e5a', live: '#639922', upcoming: '#185fa5', tbd: '#5f5e5a' };
      const stL = { past: 'past', live: 'ongoing', upcoming: 'upcoming', tbd: 'dates TBD' };

      return (
        <div style={{ maxWidth: 1200, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1.5rem' }}>
            <div>
              <h1 style={{ margin: '0 0 4px 0', fontSize: 24, fontWeight: 600 }}>Dental conference tracker</h1>
              <p style={{ margin: 0, fontSize: 13, color: '#888780' }}>International conferences · updated monthly</p>
            </div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <button onClick={loadFromGitHub} style={{ fontSize: 13, fontWeight: 500 }}>⬇ Load from GitHub</button>
              <button onClick={saveToGitHub} disabled={saving} style={{ fontSize: 13, fontWeight: 500 }}>{saving ? '⏳ Saving…' : '☁ Save to GitHub'}</button>
              <button onClick={resetToken} title="Reset stored GitHub token on this device" style={{ fontSize: 13, fontWeight: 500 }}>⚙</button>
              <input 
                type="file" 
                id="jsonImport" 
                accept=".json" 
                style={{ display: 'none' }}
                onChange={(e) => {
                  const file = e.target.files[0];
                  if (file) {
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                      try {
                        const imported = JSON.parse(evt.target.result);
                        if (Array.isArray(imported)) {
                          persist(imported);
                          alert('✓ Conference info loaded');
                          e.target.value = '';
                        } else {
                          alert('✗ Invalid file format');
                        }
                      } catch (err) {
                        alert('✗ Error reading file: ' + err.message);
                      }
                    };
                    reader.readAsText(file);
                  }
                }}
              />
              <button onClick={() => document.getElementById('jsonImport').click()} style={{ fontSize: 13, fontWeight: 500 }}>⬆ Import conference info</button>
              <button onClick={() => {
                const dataStr = JSON.stringify(confs, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `dental-conferences-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
              }} style={{ fontSize: 13, fontWeight: 500 }}>↓ Save conference info</button>
              <button onClick={openAdd} style={{ fontSize: 13, fontWeight: 500 }}>+ Add conference</button>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 12, marginBottom: '1.5rem' }}>
            {[2026, 2027, 2028, 2029, 2030].map(y => {
              const used = dByY[y] || 0;
              const pct = Math.min(100, Math.round((used / MAX_DAYS) * 100));
              const tc = used > MAX_DAYS ? '#9E2928' : used >= 8 ? '#BA7517' : '#639922';
              return (
                <div key={y} style={{ background: '#f1efe8', padding: '1rem', borderRadius: '0.5rem' }}>
                  <div style={{ fontSize: 11, color: '#888780', marginBottom: 4, fontWeight: 500 }}>{y} · confirmed days</div>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                    <span style={{ fontSize: 24, fontWeight: 600, color: tc }}>{used}</span>
                    <span style={{ fontSize: 13, color: '#888780' }}>/ {MAX_DAYS}</span>
                  </div>
                  <div style={{ marginTop: 8, height: 4, background: '#d3d1c7', borderRadius: 2, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${pct}%`, background: tc, borderRadius: 2, transition: 'width 0.3s' }} />
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{ display: 'flex', gap: 8, marginBottom: '1rem', flexWrap: 'wrap' }}>
            {[2026, 2027, 2028, 2029, 2030, 'all'].map(y => {
              const active = fy === y;
              return (
                <button key={y} onClick={() => setFy(y)} style={{
                  fontSize: 11, padding: '4px 12px',
                  background: active ? '#e6f1fb' : 'transparent',
                  color: active ? '#185fa5' : '#2c2c2a',
                  border: `0.5px solid ${active ? '#378add' : '#d3d1c7'}`,
                  fontWeight: active ? 500 : 400
                }}>
                  {y === 'all' ? 'All years' : y}
                </button>
              );
            })}
          </div>

          <div style={{ overflowX: 'auto', border: '0.5px solid #d3d1c7', borderRadius: '0.5rem' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', tableLayout: 'fixed', minWidth: 900, fontSize: 12 }}>
              <colgroup>
                <col style={{ width: '5%' }} />
                <col style={{ width: '22%' }} />
                <col style={{ width: '15%' }} />
                <col style={{ width: '14%' }} />
                <col style={{ width: '9%' }} />
                <col style={{ width: '13%' }} />
                <col style={{ width: '8%' }} />
                <col style={{ width: '7%' }} />
              </colgroup>
              <thead>
                <tr style={{ background: '#f1efe8', borderBottom: '0.5px solid #d3d1c7' }}>
                  {[['★', 'center'], ['Conference', 'left'], ['Location', 'left'], ['Dates', 'left'], ['Pre-conf', 'center'], ['Early bird', 'left'], ['Program', 'center'], ['', 'center']].map(([h, a], i) => (
                    <th key={i} style={{ padding: '10px 8px', textAlign: a, fontWeight: 500, fontSize: 11, color: '#888780', whiteSpace: 'nowrap' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((c, i) => {
                  const st = getSt(c);
                  const ebD = dUntil(c.eb);
                  const isAlert = ebD !== null && ebD >= 0 && ebD <= ALERT_DAYS;
                  const isExp = ebD !== null && ebD < 0;
                  return (
                    <tr key={c.id} style={{
                      borderBottom: i < filtered.length - 1 ? '0.5px solid #d3d1c7' : 'none',
                      background: c.confirmed ? '#eaf3de' : 'transparent',
                      opacity: st === 'past' && !c.confirmed ? 0.5 : 1,
                    }}>
                      <td style={{ padding: '10px 8px', textAlign: 'center' }}>
                        <button onClick={() => persist(confs.map(x => x.id === c.id ? { ...x, confirmed: !x.confirmed } : x))} style={{ background: 'transparent', border: 'none', padding: 0, cursor: 'pointer', fontSize: 16, color: c.confirmed ? '#639922' : '#d3d1c7', lineHeight: 1 }}>★</button>
                      </td>
                      <td style={{ padding: '10px 8px', overflow: 'hidden' }}>
                        <div style={{ fontWeight: 500, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.name}</div>
                        <div style={{ fontSize: 10, color: stC[st], marginTop: 2 }}>{stL[st]}</div>
                      </td>
                      <td style={{ padding: '10px 8px', color: '#888780', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.city}</td>
                      <td style={{ padding: '10px 8px', whiteSpace: 'nowrap' }}>
                        {c.s ? `${fmt(c.s)} – ${fmt(c.e)}` : <span style={{ color: '#b4b2a9' }}>TBD</span>}
                      </td>
                      <td style={{ padding: '10px 8px', textAlign: 'center' }}>
                        {c.pre ? <span style={{ color: '#378add', fontSize: 11 }}>{fmt(c.pre)}</span> : <span style={{ color: '#b4b2a9' }}>—</span>}
                      </td>
                      <td style={{ padding: '10px 8px' }}>
                        {c.eb ? (
                          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, whiteSpace: 'nowrap', color: isAlert ? '#BA7517' : isExp ? '#b4b2a9' : '#888780', fontSize: 11 }}>
                            {isAlert && <span style={{ fontSize: 14 }}>⚠</span>}
                            {fmt(c.eb)}
                            {isAlert && <span style={{ fontSize: 10 }}>({ebD}d)</span>}
                          </span>
                        ) : <span style={{ color: '#b4b2a9' }}>—</span>}
                      </td>
                      <td style={{ padding: '10px 8px', textAlign: 'center' }}>
                        {c.url ? <a href={c.url} target="_blank" rel="noopener noreferrer" style={{ color: '#378add', textDecoration: 'none', fontSize: 14 }}>⤳</a> : <span style={{ color: '#b4b2a9' }}>—</span>}
                      </td>
                      <td style={{ padding: '10px 8px', textAlign: 'center' }}>
                        <button onClick={() => openEdit(c)} style={{ background: 'transparent', border: 'none', padding: 2, cursor: 'pointer', fontSize: 14, color: '#888780' }}>✎</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div style={{ marginTop: '0.75rem', fontSize: 11, color: '#888780' }}>
            {filtered.length} conference{filtered.length !== 1 ? 's' : ''} shown · starred conferences flagged in JSON for calendar import</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
